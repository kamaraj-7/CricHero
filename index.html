<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricHeroes - Live Cricket Scores & Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        /* Header */
        header {
            background-color: white;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #1f2937;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text h1 {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.2;
        }

        .logo-text h1 span {
            color: #dc2626;
        }

        .logo-text p {
            font-size: 11px;
            color: #6b7280;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: #dc2626;
            color: white;
        }

        .btn-primary:hover {
            background-color: #b91c1c;
        }

        .btn-secondary {
            background-color: #2563eb;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #1d4ed8;
        }

        .btn-success {
            background-color: #16a34a;
            color: white;
        }

        .btn-success:hover {
            background-color: #15803d;
        }

        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr 300px;
            }
        }

        /* Card */
        .card {
            background: white;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
            background-color: #f9fafb;
            font-weight: bold;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Match Header */
        .match-header {
            margin-bottom: 1.5rem;
        }

        .match-title {
            color: #0d9488;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .match-details {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .match-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-live {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .badge-upcoming {
            background-color: #dbeafe;
            color: #2563eb;
        }

        .badge-completed {
            background-color: #dcfce7;
            color: #16a34a;
        }

        /* Score Display */
        .score-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
        }

        .team-score {
            text-align: center;
        }

        .team-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: 48px;
            font-weight: bold;
        }

        .score-wickets {
            font-size: 18px;
            color: #6b7280;
            margin-left: 0.5rem;
        }

        .overs {
            font-size: 13px;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        /* Scorecard Calculator */
        .scorecard-calculator {
            background-color: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .calculator-title {
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .ball-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .ball-btn {
            padding: 0.75rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ball-btn-dot {
            background-color: #d1d5db;
            color: #374151;
        }

        .ball-btn-dot:hover {
            background-color: #9ca3af;
        }

        .ball-btn-run {
            background-color: #bfdbfe;
            color: #1e40af;
        }

        .ball-btn-run:hover {
            background-color: #93c5fd;
        }

        .ball-btn-four {
            background-color: #bbf7d0;
            color: #065f46;
        }

        .ball-btn-four:hover {
            background-color: #86efac;
        }

        .ball-btn-six {
            background-color: #e9d5ff;
            color: #6b21a8;
        }

        .ball-btn-six:hover {
            background-color: #d8b4fe;
        }

        .ball-btn-wicket {
            background-color: #fecaca;
            color: #991b1b;
        }

        .ball-btn-wicket:hover {
            background-color: #fca5a5;
        }

        /* Recent Balls */
        .recent-balls {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .recent-label {
            font-weight: bold;
            margin-bottom: 0.75rem;
            font-size: 14px;
        }

        .balls-container {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .ball-badge {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.25rem;
            font-size: 12px;
            font-weight: bold;
        }

        .ball-badge-dot {
            background-color: #f3f4f6;
            color: #374151;
        }

        .ball-badge-run {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .ball-badge-four {
            background-color: #bbf7d0;
            color: #065f46;
        }

        .ball-badge-six {
            background-color: #e9d5ff;
            color: #6b21a8;
        }

        .ball-badge-wicket {
            background-color: #fee2e2;
            color: #dc2626;
        }

        /* Tabs */
        .tabs {
            margin-bottom: 1.5rem;
        }

        .tab-buttons {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #e5e7eb;
            background: white;
            border-radius: 0.5rem 0.5rem 0 0;
            overflow: hidden;
        }

        .tab-button {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            color: #6b7280;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            text-transform: capitalize;
        }

        .tab-button:hover {
            color: #1f2937;
        }

        .tab-button.active {
            color: #dc2626;
            border-bottom-color: #dc2626;
        }

        .tab-content {
            display: none;
            padding: 1.5rem;
            background: white;
            border-radius: 0 0 0.5rem 0.5rem;
            border: 1px solid #e5e7eb;
            border-top: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Tables */
        .table-title {
            font-weight: bold;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        .table-title:first-child {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background-color: #f9fafb;
        }

        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid #e5e7eb;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        tbody tr:hover {
            background-color: #f9fafb;
        }

        th:not(:first-child),
        td:not(:first-child) {
            text-align: center;
        }

        .player-name {
            color: #0d9488;
            font-weight: 500;
        }

        /* Sidebar */
        .sidebar {
            display: none;
        }

        @media (min-width: 1024px) {
            .sidebar {
                display: block;
            }
        }

        .sidebar-card {
            margin-bottom: 1.5rem;
        }

        .sidebar-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .list-item {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .list-item:hover {
            background-color: #f9fafb;
        }

        .list-item.active {
            background-color: #eff6ff;
        }

        .list-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 0.25rem;
        }

        .list-item-subtitle {
            font-size: 12px;
            color: #6b7280;
        }

        .list-item-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-small {
            padding: 0.25rem 0.5rem;
            font-size: 12px;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .btn-edit:hover {
            background-color: #bfdbfe;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #fecaca;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 0.5rem;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #6b7280;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 1rem;
        }

        .modal-footer button {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-footer .btn-submit {
            background-color: #2563eb;
            color: white;
        }

        .modal-footer .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .modal-footer .btn-cancel {
            background-color: #e5e7eb;
            color: #1f2937;
        }

        .modal-footer .btn-cancel:hover {
            background-color: #d1d5db;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
            }

            .header-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                min-width: 80px;
            }

            .score-display {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .ball-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="#" class="logo">
                <div class="logo-icon">C</div>
                <div class="logo-text">
                    <h1>cric<span>heroes</span></h1>
                    <p>Your cricket matters</p>
                </div>
            </a>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openModal('match')">+ Match</button>
                <button class="btn btn-secondary" onclick="openModal('team')">+ Team</button>
                <button class="btn btn-success" onclick="openModal('player')">+ Player</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="content-grid">
            <!-- Left Column -->
            <div id="main-content">
                <div class="card">
                    <div class="card-body" style="text-align: center; padding: 3rem;">
                        <p style="color: #6b7280; margin-bottom: 1rem;">Select a match to view details</p>
                        <button class="btn btn-primary" onclick="openModal('match')">Create First Match</button>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="sidebar">
                <!-- Matches -->
                <div class="card sidebar-card">
                    <div class="card-header">Matches</div>
                    <div class="sidebar-list" id="matches-list"></div>
                </div>

                <!-- Teams -->
                <div class="card sidebar-card">
                    <div class="card-header">Teams</div>
                    <div class="sidebar-list" id="teams-list"></div>
                </div>

                <!-- Players -->
                <div class="card sidebar-card">
                    <div class="card-header">Players</div>
                    <div class="sidebar-list" id="players-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Create Match</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="modal-form" onsubmit="handleFormSubmit(event)">
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer">
                    <button type="submit" class="btn-submit">Create</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data Storage
        let matches = JSON.parse(localStorage.getItem('cricheroes_matches')) || [];
        let teams = JSON.parse(localStorage.getItem('cricheroes_teams')) || [];
        let players = JSON.parse(localStorage.getItem('cricheroes_players')) || [];
        let selectedMatch = null;
        let currentModalType = null;
        let editingId = null;

        // Save to localStorage
        function saveData() {
            localStorage.setItem('cricheroes_matches', JSON.stringify(matches));
            localStorage.setItem('cricheroes_teams', JSON.stringify(teams));
            localStorage.setItem('cricheroes_players', JSON.stringify(players));
        }

        // Render Functions
        function renderMatches() {
            const list = document.getElementById('matches-list');
            if (matches.length === 0) {
                list.innerHTML = '<div class="empty-state">No matches yet</div>';
                return;
            }
            list.innerHTML = matches.map(m => `
                <div class="list-item ${selectedMatch?.id === m.id ? 'active' : ''}" onclick="selectMatch('${m.id}')">
                    <div class="list-item-title">${m.name}</div>
                    <div class="list-item-subtitle">${m.team1} vs ${m.team2}</div>
                    <span class="badge ${m.status === 'live' ? 'badge-live' : m.status === 'completed' ? 'badge-completed' : 'badge-upcoming'}">${m.status}</span>
                    <div class="list-item-actions">
                        <button class="btn-small btn-edit" onclick="event.stopPropagation(); editMatch('${m.id}')">Edit</button>
                        <button class="btn-small btn-delete" onclick="event.stopPropagation(); deleteMatch('${m.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderTeams() {
            const list = document.getElementById('teams-list');
            if (teams.length === 0) {
                list.innerHTML = '<div class="empty-state">No teams yet</div>';
                return;
            }
            list.innerHTML = teams.map(t => `
                <div class="list-item">
                    <div class="list-item-title">${t.name}</div>
                    <div class="list-item-subtitle">Coach: ${t.coach}</div>
                    <div class="list-item-subtitle">W: ${t.wins} L: ${t.losses}</div>
                    <div class="list-item-actions">
                        <button class="btn-small btn-edit" onclick="editTeam('${t.id}')">Edit</button>
                        <button class="btn-small btn-delete" onclick="deleteTeam('${t.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPlayers() {
            const list = document.getElementById('players-list');
            if (players.length === 0) {
                list.innerHTML = '<div class="empty-state">No players yet</div>';
                return;
            }
            list.innerHTML = players.map(p => `
                <div class="list-item">
                    <div class="list-item-title">${p.name}</div>
                    <div class="list-item-subtitle">${p.team} • ${p.role}</div>
                    <div class="list-item-subtitle">R: ${p.runs} W: ${p.wickets}</div>
                    <div class="list-item-actions">
                        <button class="btn-small btn-edit" onclick="editPlayer('${p.id}')">Edit</button>
                        <button class="btn-small btn-delete" onclick="deletePlayer('${p.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderMatchDetail() {
            if (!selectedMatch) {
                document.getElementById('main-content').innerHTML = `
                    <div class="card">
                        <div class="card-body" style="text-align: center; padding: 3rem;">
                            <p style="color: #6b7280; margin-bottom: 1rem;">Select a match to view details</p>
                            <button class="btn btn-primary" onclick="openModal('match')">Create First Match</button>
                        </div>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="match-header card">
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div class="match-title">${selectedMatch.name}</div>
                                <div class="match-details">${selectedMatch.venue}</div>
                                <div class="match-details">${selectedMatch.date}</div>
                                <div class="match-details">Toss: ${selectedMatch.toss || 'N/A'}</div>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <span class="badge ${selectedMatch.status === 'live' ? 'badge-live' : selectedMatch.status === 'completed' ? 'badge-completed' : 'badge-upcoming'}">${selectedMatch.status}</span>
                                <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 12px;" onclick="editMatch('${selectedMatch.id}')">Edit</button>
                                <button class="btn btn-delete" style="padding: 0.25rem 0.5rem; font-size: 12px; background-color: #fee2e2; color: #dc2626;" onclick="deleteMatch('${selectedMatch.id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="score-display">
                    <div class="team-score">
                        <div class="team-name">${selectedMatch.team1}</div>
                        <div class="score-value">${selectedMatch.team1Score}<span class="score-wickets">/10</span></div>
                        <div class="overs">${selectedMatch.team1Overs || '0.0 Ov'}</div>
                    </div>
                    <div class="team-score">
                        <div class="team-name">${selectedMatch.team2}</div>
                        <div class="score-value">${selectedMatch.team2Score}<span class="score-wickets">/3</span></div>
                        <div class="overs">${selectedMatch.team2Overs || '0.0 Ov'}</div>
                    </div>
                </div>

                ${selectedMatch.status === 'live' ? `
                    <div class="scorecard-calculator">
                        <div class="calculator-title">📊 Live Scorecard Calculator</div>
                        <div class="ball-buttons">
                            <button type="button" class="ball-btn ball-btn-dot" onclick="addBall(0, 'dot')">Dot</button>
                            <button type="button" class="ball-btn ball-btn-run" onclick="addBall(1, 'single')">1</button>
                            <button type="button" class="ball-btn ball-btn-run" onclick="addBall(2, 'double')">2</button>
                            <button type="button" class="ball-btn ball-btn-run" onclick="addBall(3, 'triple')">3</button>
                            <button type="button" class="ball-btn ball-btn-four" onclick="addBall(4, 'four')">4</button>
                            <button type="button" class="ball-btn ball-btn-six" onclick="addBall(6, 'six')">6</button>
                            <button type="button" class="ball-btn ball-btn-run" onclick="addBall(0, 'wide')">Wide</button>
                            <button type="button" class="ball-btn ball-btn-run" onclick="addBall(0, 'no-ball')">No Ball</button>
                            <button type="button" class="ball-btn ball-btn-wicket" onclick="addBall(0, 'wicket')">Wicket</button>
                        </div>
                    </div>
                ` : ''}

                ${selectedMatch.balls && selectedMatch.balls.length > 0 ? `
                    <div class="recent-balls">
                        <div class="recent-label">Recent Balls (Last 15):</div>
                        <div class="balls-container">
                            ${selectedMatch.balls.slice(-15).map(ball => `
                                <div class="ball-badge ball-badge-${ball.type === 'wicket' ? 'wicket' : ball.type === 'six' ? 'six' : ball.type === 'four' ? 'four' : ball.runs === 0 ? 'dot' : 'run'}">
                                    ${ball.type === 'wicket' ? 'W' : ball.runs}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}

                <div class="tabs">
                    <div class="tab-buttons">
                        <button class="tab-button active" onclick="switchTab('live')">Live</button>
                        <button class="tab-button" onclick="switchTab('scorecard')">Scorecard</button>
                        <button class="tab-button" onclick="switchTab('commentary')">Commentary</button>
                    </div>
                    <div class="tab-content active" id="live">
                        <p style="text-align: center; color: #6b7280;">Live scorecard updates will appear here</p>
                    </div>
                    <div class="tab-content" id="scorecard">
                        <p style="text-align: center; color: #6b7280;">Scorecard details coming soon</p>
                    </div>
                    <div class="tab-content" id="commentary">
                        <p style="text-align: center; color: #6b7280;">Commentary coming soon</p>
                    </div>
                </div>
            `;

            document.getElementById('main-content').innerHTML = html;
        }

        // Match Functions
        function selectMatch(id) {
            selectedMatch = matches.find(m => m.id === id);
            renderMatchDetail();
            renderMatches();
        }

        function addBall(runs, type) {
            if (!selectedMatch) return;
            if (!selectedMatch.balls) selectedMatch.balls = [];

            selectedMatch.balls.push({ id: Date.now().toString(), runs, type });
            selectedMatch.team2Score += runs;

            const totalBalls = selectedMatch.balls.length;
            const overs = Math.floor(totalBalls / 6);
            const balls = totalBalls % 6;
            selectedMatch.team2Overs = `${overs}.${balls} Ov`;
            selectedMatch.currentRunRate = (selectedMatch.team2Score / totalBalls * 6).toFixed(2);

            saveData();
            renderMatchDetail();
        }

        function deleteMatch(id) {
            if (!confirm('Delete this match?')) return;
            matches = matches.filter(m => m.id !== id);
            if (selectedMatch?.id === id) selectedMatch = null;
            saveData();
            renderMatches();
            renderMatchDetail();
        }

        function editMatch(id) {
            const match = matches.find(m => m.id === id);
            if (match) {
                editingId = id;
                currentModalType = 'match';
                openModal('match', match);
            }
        }

        // Team Functions
        function deleteTeam(id) {
            if (!confirm('Delete this team?')) return;
            teams = teams.filter(t => t.id !== id);
            saveData();
            renderTeams();
        }

        function editTeam(id) {
            const team = teams.find(t => t.id === id);
            if (team) {
                editingId = id;
                currentModalType = 'team';
                openModal('team', team);
            }
        }

        // Player Functions
        function deletePlayer(id) {
            if (!confirm('Delete this player?')) return;
            players = players.filter(p => p.id !== id);
            saveData();
            renderPlayers();
        }

        function editPlayer(id) {
            const player = players.find(p => p.id === id);
            if (player) {
                editingId = id;
                currentModalType = 'player';
                openModal('player', player);
            }
        }

        // Modal Functions
        function openModal(type, data = null) {
            currentModalType = type;
            editingId = data?.id || null;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            const submitBtn = modal.querySelector('button[type="submit"]');

            let formHTML = '';

            if (type === 'match') {
                title.textContent = editingId ? 'Edit Match' : 'Create Match';
                formHTML = `
                    <div class="form-group">
                        <label>Match Name</label>
                        <input type="text" name="name" value="${data?.name || ''}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Team 1</label>
                            <input type="text" name="team1" value="${data?.team1 || ''}" required>
                        </div>
                        <div class="form-group">
                            <label>Team 2</label>
                            <input type="text" name="team2" value="${data?.team2 || ''}" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Venue</label>
                        <input type="text" name="venue" value="${data?.venue || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" name="date" value="${data?.date || ''}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Overs</label>
                            <input type="number" name="overs" value="${data?.overs || 20}" required>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" required>
                                <option value="upcoming" ${data?.status === 'upcoming' ? 'selected' : ''}>Upcoming</option>
                                <option value="live" ${data?.status === 'live' ? 'selected' : ''}>Live</option>
                                <option value="completed" ${data?.status === 'completed' ? 'selected' : ''}>Completed</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Toss</label>
                        <input type="text" name="toss" value="${data?.toss || ''}">
                    </div>
                `;
            } else if (type === 'team') {
                title.textContent = editingId ? 'Edit Team' : 'Create Team';
                formHTML = `
                    <div class="form-group">
                        <label>Team Name</label>
                        <input type="text" name="name" value="${data?.name || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Coach Name</label>
                        <input type="text" name="coach" value="${data?.coach || ''}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Wins</label>
                            <input type="number" name="wins" value="${data?.wins || 0}">
                        </div>
                        <div class="form-group">
                            <label>Losses</label>
                            <input type="number" name="losses" value="${data?.losses || 0}">
                        </div>
                    </div>
                `;
            } else if (type === 'player') {
                title.textContent = editingId ? 'Edit Player' : 'Create Player';
                formHTML = `
                    <div class="form-group">
                        <label>Player Name</label>
                        <input type="text" name="name" value="${data?.name || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Team</label>
                        <input type="text" name="team" value="${data?.team || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role" required>
                            <option value="batsman" ${data?.role === 'batsman' ? 'selected' : ''}>Batsman</option>
                            <option value="bowler" ${data?.role === 'bowler' ? 'selected' : ''}>Bowler</option>
                            <option value="all-rounder" ${data?.role === 'all-rounder' ? 'selected' : ''}>All-rounder</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Runs</label>
                            <input type="number" name="runs" value="${data?.runs || 0}">
                        </div>
                        <div class="form-group">
                            <label>Wickets</label>
                            <input type="number" name="wickets" value="${data?.wickets || 0}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Matches</label>
                        <input type="number" name="matches" value="${data?.matches || 0}">
                    </div>
                `;
            }

            body.innerHTML = formHTML;
            submitBtn.textContent = editingId ? 'Update' : 'Create';
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingId = null;
            currentModalType = null;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            if (currentModalType === 'match') {
                if (editingId) {
                    const idx = matches.findIndex(m => m.id === editingId);
                    matches[idx] = { ...matches[idx], ...data };
                    selectedMatch = matches[idx];
                } else {
                    const newMatch = { id: Date.now().toString(), ...data, team1Score: 0, team2Score: 0, balls: [] };
                    matches.push(newMatch);
                    selectedMatch = newMatch;
                }
            } else if (currentModalType === 'team') {
                if (editingId) {
                    const idx = teams.findIndex(t => t.id === editingId);
                    teams[idx] = { ...teams[idx], ...data };
                } else {
                    teams.push({ id: Date.now().toString(), ...data });
                }
            } else if (currentModalType === 'player') {
                if (editingId) {
                    const idx = players.findIndex(p => p.id === editingId);
                    players[idx] = { ...players[idx], ...data };
                } else {
                    players.push({ id: Date.now().toString(), ...data });
                }
            }

            saveData();
            closeModal();
            renderMatches();
            renderTeams();
            renderPlayers();
            renderMatchDetail();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Initialize
        renderMatches();
        renderTeams();
        renderPlayers();
        renderMatchDetail();
    </script>
</body>
</html>
